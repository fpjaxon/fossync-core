name: Feature request
description: Suggest an idea or improvement for fossync.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. Tell us the problem first — it helps us find the best
        solution, which isn't always the first one that comes to mind.

        Want support for a specific streaming site? Use the *Site support request*
        template instead.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that fossync makes hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature or change you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways you've worked around this, or other designs you weighed.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - Sync engine (accuracy, drift, control modes)
        - Extension UX (popup, sidebar, chat, reactions)
        - A new site (use the Site support template if it's just one site)
        - Relay / self-hosting
        - Docs
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this isn't already requested.
          required: true
        - label: I'd be willing to help build this (no obligation — see CONTRIBUTING.md).
          required: false
