name: Bug report
description: Something in fossync isn't syncing or working the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete the detail, the
        faster we can reproduce it.

        - **Found a security or privacy issue?** Please report it privately instead —
          see [SECURITY.md](https://github.com/fpjaxon/fossync-core/blob/main/SECURITY.md).
        - **A site stopped working, or you want a new one?** Use the
          *Site support request* template instead.

  - type: dropdown
    id: component
    attributes:
      label: Which part of fossync?
      options:
        - Extension (popup, sidebar, sync on a page)
        - Relay / worker (rooms, WebSocket)
        - sync-core (the sync engine itself)
        - Test harness
        - Website (fossync.com)
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: site
    attributes:
      label: Where were you watching?
      options:
        - YouTube
        - Crunchyroll
        - The test harness
        - Another HTML5 video site
        - Not applicable
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      description: e.g. Firefox 127, Zen 1.0.2. fossync is a Firefox (MV2) extension.
      placeholder: Firefox 127
    validations:
      required: true

  - type: input
    id: ext-version
    attributes:
      label: fossync extension version
      description: Find it at about:addons → fossync. The extension auto-updates, so please confirm you're on the latest.
      placeholder: 0.0.9
    validations:
      required: false

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Screenshots or a short clip help.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger it ourselves?
      placeholder: |
        1. Open a YouTube watch page
        2. Click Start Sync, copy the invite link
        3. Open the link in a second tab
        4. Press pause in tab 1 — tab 2 keeps playing
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console errors or logs
      description: Anything red in the browser console (F12) or the extension's background page. Optional, but very helpful.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on the latest version of the extension (it auto-updates within a day).
          required: false
        - label: I disabled other watch-party extensions (e.g. Teleparty) — they hook the same `<video>` element and fight with fossync.
          required: false
        - label: If I'm using a relay other than the official one (fossync.cloud), I've noted that below.
          required: false
