name = "fossync"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
# Pin the account (the login has more than one); the fossync worker + fossync.cloud
# custom domain live in the Floatpoint account.
account_id = "b654800db7aae56c4efb698fd7399fff"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDurableObject"

[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "RoomRegistry"

[[migrations]]
tag = "v1"
# SQLite-backed Durable Objects are free-plan compatible and the design's
# idle-cost rationale depends on them.
new_sqlite_classes = ["RoomDurableObject"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RoomRegistry"]

[[r2_buckets]]
# Signed .xpi files + updates.json for self-hosted extension distribution.
binding = "BUILDS"
bucket_name = "fossync-builds"
