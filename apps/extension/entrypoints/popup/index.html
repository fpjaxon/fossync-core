<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Sync</title>
    <style>
      body { font-family: system-ui, sans-serif; width: 320px; margin: 0; padding: 10px; }
      .row { display: flex; gap: 6px; align-items: center; margin: 6px 0; }
      label { font-size: 12px; flex: 1; display: flex; gap: 6px; align-items: center; }
      input { flex: 1; min-width: 0; }
      button { cursor: pointer; }
      #stats { font-family: ui-monospace, monospace; white-space: pre; font-size: 12px; background: #111; color: #0f0; padding: 8px; border-radius: 4px; margin-top: 8px; min-height: 8em; }
    </style>
  </head>
  <body>
    <div class="row">
      <label>Room <input id="room" value="TEST01" /></label>
      <button id="newRoom">New</button>
    </div>
    <div class="row">
      <label>Name <input id="name" value="Ext" /></label>
    </div>
    <div class="row">
      <button id="connect">Connect</button>
      <button id="openHarness">Open harness</button>
    </div>
    <div id="stats">idle</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
