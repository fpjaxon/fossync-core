<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fossync</title>
    <style>
      body { font-family: system-ui, sans-serif; width: 320px; margin: 0; padding: 10px; }
      .row { display: flex; gap: 6px; align-items: center; margin: 6px 0; }
      label { font-size: 12px; flex: 1; display: flex; gap: 6px; align-items: center; }
      input { flex: 1; min-width: 0; }
      button { cursor: pointer; }
      .hidden { display: none; }
      #invite { font: 11px ui-monospace, monospace; }
      #room { font-weight: 600; }
      #status { font: 12px ui-monospace, monospace; color: #444; margin-top: 6px; min-height: 1.2em; }
    </style>
  </head>
  <body>
    <div class="row">
      <label>Name <input id="name" placeholder="display name" /></label>
    </div>

    <div id="idle">
      <div class="row">
        <button id="startSync">Start Sync</button>
        <button id="openHarness">Open harness</button>
      </div>
    </div>

    <div id="synced" class="hidden">
      <div class="row">Synced — room <span id="room"></span></div>
      <div class="row">
        <input id="invite" readonly />
        <button id="copy">Copy</button>
      </div>
      <div class="row"><button id="stop">Stop</button></div>
    </div>

    <div id="status"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
