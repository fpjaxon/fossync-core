name = "harness"
compatibility_date = "2026-01-01"
# Pin the account (the login has more than one); harness + harness.fossync.cloud
# live in the Floatpoint account, same as the fossync worker.
account_id = "b654800db7aae56c4efb698fd7399fff"

[assets]
directory = "./dist"
